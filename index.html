<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e2e8f0;

            --cold-color: #3498db;
            --mild-color: #2ecc71;
            --hot-color: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .loading,
        .error {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 40px;
        }

        .error {
            color: var(--hot-color);
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .forecast-container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .weather-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .weather-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .date {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .weather-icon {
            font-size: 3rem;
            margin: 16px 0;
            display: block;
        }

        .temp-display {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .temp-sub {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .summary-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-cold {
            color: var(--cold-color);
        }

        .status-cold .summary-badge {
            background-color: #e1f5fe;
            color: #0288d1;
        }

        .status-mild {
            color: var(--mild-color);
        }

        .status-mild .summary-badge {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status-hot font {
            color: var(--hot-color);
        }

        .status-hot .summary-badge {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>

<body>

    <h1>5-Day Weather Forecast</h1>

    <div id="loading" class="loading">Fetching latest weather data...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="forecast-container" class="forecast-container"></div>

    <script>
        const API_URL = 'https://sampleapi20260706g3-bvdacte9b0dvhudv.canadacentral-01.azurewebsites.net/Weatherforecast';

        function formatDate(dateString) {
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            const date = new Date(dateString + 'T00:00:00');
            return date.toLocaleDateString('en-US', options);
        }

        function getWeatherMeta(tempC, summary) {
            const normalizedSummary = summary.toLowerCase();

            let icon = '☀️';
            let tempClass = 'status-mild';

            if (tempC <= 5 || normalizedSummary.includes('freezing') || normalizedSummary.includes('bracing')) {
                icon = '❄️';
                tempClass = 'status-cold';
            } else if (tempC >= 25 || normalizedSummary.includes('sweltering') || normalizedSummary.includes('hot')) {
                icon = '🔥';
                tempClass = 'status-hot';
            } else if (normalizedSummary.includes('cool') || normalizedSummary.includes('chilly')) {
                icon = '☁️';
                tempClass = 'status-cold';
            } else {
                icon = '🌤️';
                tempClass = 'status-mild';
            }

            return { icon, tempClass };
        }

        async function fetchForecast() {
            const container = document.getElementById('forecast-container');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');

            try {
                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                loadingEl.style.display = 'none';

                container.innerHTML = data.map(day => {
                    const { icon, tempClass } = getWeatherMeta(day.temperatureC, day.summary);

                    return `
            <div class="weather-card ${tempClass}">
              <div class="date">${formatDate(day.date)}</div>
              <span class="weather-icon">${icon}</span>
              <div class="temp-display">${day.temperatureC}°C</div>
              <div class="temp-sub">${day.temperatureF}°F</div>
              <span class="summary-badge">${day.summary}</span>
            </div>
          `;
                }).join('');

                container.classList.add('loaded');

            } catch (error) {
                console.error("Failed to load weather data:", error);
                loadingEl.style.display = 'none';
                errorEl.textContent = `Failed to load forecast data. (${error.message})`;
                errorEl.style.display = 'block';
            }
        }

        fetchForecast();
    </script>
</body>

</html>
